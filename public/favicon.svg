<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" shape-rendering="crispEdges">
  <rect width="8" height="8" fill="#0d0d0d"/>
  <!-- y=0: rounded head top -->
  <rect x="2" y="0" width="1" height="1" fill="#e0e0e0"/>
  <rect x="3" y="0" width="1" height="1" fill="#e0e0e0"/>
  <rect x="4" y="0" width="1" height="1" fill="#e0e0e0"/>
  <rect x="5" y="0" width="1" height="1" fill="#e0e0e0"/>
  <!-- y=1: head widens -->
  <rect x="1" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="2" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="3" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="4" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="5" y="1" width="1" height="1" fill="#e0e0e0"/>
  <rect x="6" y="1" width="1" height="1" fill="#e0e0e0"/>
  <!-- y=2: eyes (gaps at x=2 and x=5) -->
  <rect x="0" y="2" width="1" height="1" fill="#e0e0e0"/>
  <rect x="1" y="2" width="1" height="1" fill="#e0e0e0"/>
  <rect x="3" y="2" width="1" height="1" fill="#e0e0e0"/>
  <rect x="4" y="2" width="1" height="1" fill="#e0e0e0"/>
  <rect x="6" y="2" width="1" height="1" fill="#e0e0e0"/>
  <rect x="7" y="2" width="1" height="1" fill="#e0e0e0"/>
  <!-- y=3: full row -->
  <rect x="0" y="3" width="8" height="1" fill="#e0e0e0"/>
  <!-- y=4: full row -->
  <rect x="0" y="4" width="8" height="1" fill="#e0e0e0"/>
  <!-- y=5: full row -->
  <rect x="0" y="5" width="8" height="1" fill="#e0e0e0"/>
  <!-- y=6: scalloped bottom (gaps at x=1 and x=6) -->
  <rect x="0" y="6" width="1" height="1" fill="#e0e0e0"/>
  <rect x="2" y="6" width="1" height="1" fill="#e0e0e0"/>
  <rect x="3" y="6" width="1" height="1" fill="#e0e0e0"/>
  <rect x="4" y="6" width="1" height="1" fill="#e0e0e0"/>
  <rect x="5" y="6" width="1" height="1" fill="#e0e0e0"/>
  <rect x="7" y="6" width="1" height="1" fill="#e0e0e0"/>
  <!-- y=7: scalloped feet -->
  <rect x="2" y="7" width="1" height="1" fill="#e0e0e0"/>
  <rect x="5" y="7" width="1" height="1" fill="#e0e0e0"/>
</svg>
